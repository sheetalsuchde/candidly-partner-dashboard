<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      padding: 24px;
      background: #fff;
      color: #1e2128;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #265ddc;
      margin-bottom: 8px;
    }
    p {
      font-size: 12px;
      color: #6b7380;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      background: #265ddc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status {
      font-size: 11px;
      color: #6b7380;
      text-align: center;
      margin-top: 10px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="logo">candidly</div>
  <p>This will create the full Partner Dashboard design as editable Figma layers in your current file.</p>
  <button id="btn" onclick="onCreate()">Create Dashboard in Figma</button>
  <div class="status" id="status"></div>

  <script>
    function onCreate() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Building…';
      status.textContent = 'Creating layers, please wait…';
      parent.postMessage({ pluginMessage: { type: 'create' } }, '*');
    }
  </script>
</body>
</html>
